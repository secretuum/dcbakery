<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- lunch box body -->
  <rect x="10" y="24" width="44" height="26" rx="4" fill="#f47b6f"/>
  <!-- lid -->
  <rect x="8" y="18" width="48" height="10" rx="3" fill="#c4395a"/>
  <!-- handle notch -->
  <rect x="26" y="14" width="12" height="6" rx="2" fill="#8b1a4a"/>
  <!-- compartments -->
  <line x1="32" y1="30" x2="32" y2="46" stroke="#8b1a4a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="38" x2="50" y2="38" stroke="#8b1a4a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- food dots -->
  <circle cx="22" cy="38" r="4" fill="#ffe1d6"/>
  <circle cx="42" cy="33" r="2.5" fill="#ffe1d6"/>
  <circle cx="44" cy="43" r="2.5" fill="#ffe1d6"/>
  <!-- shadow -->
  <ellipse cx="32" cy="54" rx="20" ry="3" fill="#8b1a4a" opacity="0.2"/>
  <!-- steam dots -->
  <circle cx="46" cy="10" r="2" fill="#c4395a" opacity="0.5"/>
  <circle cx="52" cy="14" r="1.5" fill="#c4395a" opacity="0.5"/>
</svg>
