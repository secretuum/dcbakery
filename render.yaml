services:
  - type: web
    name: dcbakery
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GREEN_API_INSTANCE_ID
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
      - key: GREEN_API_CHAT_ID
        sync: false
      - key: GREEN_API_FORWARD_WEBHOOK_URL
        sync: false
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
      - key: WHATSAPP_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_RETAIL_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: OPERATIONS_REMINDER_SECRET
        sync: false
      - key: OPERATIONS_LOW_STOCK_THRESHOLD
        value: 5
      - key: DC_RESPONSIBLE_DEFAULT_NAME
        sync: false
      - key: DC_RESPONSIBLE_DEFAULT_PHONE
        sync: false
      - key: DC_RESPONSIBLE_MANAGER_NAME
        sync: false
      - key: DC_RESPONSIBLE_MANAGER_PHONE
        sync: false
      - key: DC_RESPONSIBLE_DESSERT_LEAD_NAME
        sync: false
      - key: DC_RESPONSIBLE_DESSERT_LEAD_PHONE
        sync: false
      - key: DC_RESPONSIBLE_SEMI_FINISHED_LEAD_NAME
        sync: false
      - key: DC_RESPONSIBLE_SEMI_FINISHED_LEAD_PHONE
        sync: false
      - key: DC_RESPONSIBLE_MEAT_LEAD_NAME
        sync: false
      - key: DC_RESPONSIBLE_MEAT_LEAD_PHONE
        sync: false
